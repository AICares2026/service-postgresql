name: Deploy to EKS

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: aiops-agent-demo-cluster
  NAMESPACE: aicares
  SERVICE_NAME: postgresql

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Delete conflicting resources
        run: |
          kubectl delete deployment ${{ env.SERVICE_NAME }} -n ${{ env.NAMESPACE }} --ignore-not-found
          kubectl delete service    ${{ env.SERVICE_NAME }} -n ${{ env.NAMESPACE }} --ignore-not-found
          kubectl delete deployment service-${{ env.SERVICE_NAME }} -n ${{ env.NAMESPACE }} --ignore-not-found
          kubectl delete service    service-${{ env.SERVICE_NAME }} -n ${{ env.NAMESPACE }} --ignore-not-found

      - name: Deploy
        run: |
          helm upgrade --install service-${{ env.SERVICE_NAME }} ./helm/service-chart \
            --namespace ${{ env.NAMESPACE }} \
            --values ./helm/values.yaml \
            --wait --timeout 5m
