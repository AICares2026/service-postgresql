service:
  name: service-postgresql
  namespace: aicares
image:
  repository: postgres
  tag: "17.8"
  pullPolicy: IfNotPresent
containerPort: 5432
resources:
  limits:
    memory: "80Mi"
  requests:
    memory: "32Mi"
    cpu: "50m"
env:
  - name: POSTGRES_PASSWORD
    value: "changeit"
  - name: POSTGRES_DB
    value: "astronomy"
nodeSelector:
  eks.amazonaws.com/nodegroup: graviton-workers
